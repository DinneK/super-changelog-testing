name: Generate Changelog

on:
    schedule:
        - cron: '0 0 * * 5'
    workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  issues: read

jobs:
  generate-weekly-data:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate app token
        id: app-token
        if: ${{ vars.APP_ID != '' }}
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Generate weekly changelog
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token || secrets.GH_TOKEN }}
        run: python scripts/generate_changelog_weekly.py

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install PyGithub
      
      - name: Generate full summary
        run: |
          python scripts/generate_summary.py
      
      - name: Generate condensed summary
        run: |
          python scripts/generate_summary_condensed.py

      - name: Upload summary artifacts
        uses: actions/upload-artifact@v4
        with:
          name: weekly-changelog-summaries
          path: |
            changelog_data/summaries/
            changelog_data/data/weekly_changelog_*.json

  create-full-summary-pr:
    needs: generate-weekly-data
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate app token
        uses: actions/create-github-app-token@v1
        id: app-token
        with:
          app-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install PyGithub

      - name: Download summary artifacts
        uses: actions/download-artifact@v4
        with:
          name: weekly-changelog-summaries
          path: changelog_data/

      - name: Create Pull Request with Full Summary
        env: 
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          # Get latest summary files
          TIMESTAMP=$(date +"%Y-%m-%d")
          PR_TITLE_FILE="changelog_data/summaries/pr_title_${TIMESTAMP}.txt"
          PR_BODY_FILE="changelog_data/summaries/pr_body_${TIMESTAMP}.md"

          if [ ! -f "$PR_TITLE_FILE" ] || [ ! -f "$PR_BODY_FILE" ]; then
            echo "Summary not found, checking latest file..."
            PR_TITLE_FILE=$(ls -t changelog_data/summaries/pr_title_*.txt 2>/dev/null | grep -v "condensed" | head -n1)
            PR_BODY_FILE=$(ls -t changelog_data/summaries/pr_body_*.md 2>/dev/null | grep -v "condensed" | head -n1)
          fi

          if [ -f "$PR_TITLE_FILE" ] && [ -f "$PR_BODY_FILE" ]; then
            PR_TITLE=$(cat "$PR_TITLE_FILE")

            BRANCH_NAME="weekly-changelog-$(date +"%Y-%m-%d")"

            git config --local user.email "action@github.com"
            git config --local user.name "GitHub Action" 
            
            if git ls-remote --exit-code --heads origin "$BRANCH_NAME"; then
              echo "Branch $BRANCH_NAME exists, updating..."
              git fetch origin "$BRANCH_NAME"
              git checkout "$BRANCH_NAME"
              git pull origin "$BRANCH_NAME"
            else
              echo "Creating new branch $BRANCH_NAME ..."
              git checkout -b "$BRANCH_NAME"
            fi

            git add changelog_data/
            if git diff-index --quiet HEAD --; then
              echo "No changes to commit"
            else
              git commit -sm "Add weekly changelog summary for $(date +"%Y-%m-%d")"
              git push --set-upstream origin "$BRANCH_NAME"
            fi

            if ! gh pr view "$BRANCH_NAME" --json number 2>/dev/null; then
              gh api repos/${{ github.repository }}/labels -f name='changelog' -f color='0E8A16' || true
              gh api repos/${{ github.repository }}/labels -f name='automated' -f color='FB04D4' || true

              gh pr create \
                --title "$PR_TITLE" \
                --body-file "$PR_BODY_FILE" \
                --base main \
                --head "$BRANCH_NAME" \
                --label "changelog,automated" || \
                gh pr create \
                  --title "$PR_TITLE" \
                  --body-file "$PR_BODY_FILE" \
                  --base main \
                  --head "$BRANCH_NAME"
            else
              echo "PR already exists for $BRANCH_NAME"
            fi
          else
            echo "Could not find PR title or body files"
            exit 1
          fi

  create-condensed-summary-pr:
    needs: generate-weekly-data
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate app token
        uses: actions/create-github-app-token@v1
        id: app-token
        with:
          app-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install PyGithub

      - name: Download summary artifacts
        uses: actions/download-artifact@v4
        with:
          name: weekly-changelog-summaries
          path: changelog_data/

      - name: Create Condensed Pull Request
        env: 
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          # Get latest condensed summary files
          TIMESTAMP=$(date +"%Y-%m-%d")
          PR_TITLE_FILE="changelog_data/summaries/pr_title_condensed_${TIMESTAMP}.txt"
          PR_BODY_FILE="changelog_data/summaries/pr_body_condensed_${TIMESTAMP}.md"

          if [ ! -f "$PR_TITLE_FILE" ] || [ ! -f "$PR_BODY_FILE" ]; then
            echo "Condensed summary not found, checking latest file..."
            PR_TITLE_FILE=$(ls -t changelog_data/summaries/pr_title_condensed_*.txt 2>/dev/null | head -n1)
            PR_BODY_FILE=$(ls -t changelog_data/summaries/pr_body_condensed_*.md 2>/dev/null | head -n1)
          fi

          if [ -f "$PR_TITLE_FILE" ] && [ -f "$PR_BODY_FILE" ]; then
            PR_TITLE=$(cat "$PR_TITLE_FILE")

            BRANCH_NAME="weekly-changelog-condensed-$(date +"%Y-%m-%d")"

            git config --local user.email "action@github.com"
            git config --local user.name "GitHub Action"

            if git ls-remote --exit-code --heads origin "$BRANCH_NAME"; then
              echo "Branch $BRANCH_NAME exists, updating..."
              git fetch origin "$BRANCH_NAME"
              git checkout "$BRANCH_NAME"
              git pull origin "$BRANCH_NAME"
            else
              echo "Creating new branch..."
              git checkout -b "$BRANCH_NAME"
            fi

            git add changelog_data/
            if git diff-index --quiet HEAD --; then
              echo "No changes to commit"
            else
              git commit -sm "Add weekly condensed changelog summary for $(date +"%Y-%m-%d")"
              git push origin "$BRANCH_NAME"
            fi

            if ! gh pr view "$BRANCH_NAME" --json number 2>/dev/null; then
              gh api repos/${{ github.repository }}/labels -f name='changelog' -f color='0E8A16' || true
              gh api repos/${{ github.repository }}/labels -f name='automated' -f color='FB04D4' || true
              gh api repos/${{ github.repository }}/labels -f name='condensed' -f color='FFD700' || true

              gh pr create \
                --title "$PR_TITLE" \
                --body-file "$PR_BODY_FILE" \
                --base main \
                --head "$BRANCH_NAME" \
                --label "changelog,automated,condensed" || \
                gh pr create \
                  --title "$PR_TITLE" \
                  --body-file "$PR_BODY_FILE" \
                  --base main \
                  --head "$BRANCH_NAME"
            else
              echo "PR already exists for $BRANCH_NAME"
            fi
          else
            echo "Could not find PR title or body files"
            exit 1
          fi
